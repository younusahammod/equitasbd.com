kind = "web"
previewPath = "/"
title = "EQUITAS Law Firm"
version = "1.0.0"
id = "artifacts/equitas-law-firm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18821

[services.development]
run = "pnpm --filter @workspace/equitas-law-firm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/equitas-law-firm", "run", "build" ]
publicDir = "artifacts/equitas-law-firm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18821"
BASE_PATH = "/"
